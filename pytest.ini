[pytest]
asyncio_mode = auto
testpaths = tests
markers =
    unit:      Pure Python, no network (~5s)
    api:       FastAPI/WebSocket, TestClient (~30s)
    e2e:       Playwright browser tests (~5 min)
    trulens:   TruLens LLM-as-judge evals (~10 min)
    guardrail: Security tests — all must pass for release
